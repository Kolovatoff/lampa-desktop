name: Build and Release AppImage, macOS, Windows builds

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      changelog_body: ${{ steps.changelog.outputs.body }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "yarn"

      - name: Install Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 rpm

      - name: Build linux packages
        run: |
          yarn run build-linux

      - name: Extract version
        id: get_version
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "version=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          fi

      - name: Extract changelog for version
        id: changelog
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          sed -n "/^## \\[${VERSION}\\]/,/^## /p" CHANGELOG.md | sed '$d' > changelog.txt
          if [ ! -s changelog.txt ]; then
            echo "No changelog entries found for version $VERSION"
            echo "body=No changelog entries found for version $VERSION" >> $GITHUB_OUTPUT
          else
            echo "body<<EOF" >> $GITHUB_OUTPUT
            cat changelog.txt >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v6
        with:
          name: lampa-linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/latest-linux.yml

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "yarn"

      - name: Install Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build for macOS
        run: |
          yarn run build-mac

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v6
        with:
          name: lampa-macos
          path: |
            dist/*.dmg
            dist/*.blockmap
            dist/latest-mac.yml

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "yarn"

      - name: Install Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build for Windows
        run: |
          yarn run build-win

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v6
        with:
          name: lampa-windows
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml

  generate-downloads-table:
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows]
    outputs:
      downloads_section: ${{ steps.generate.outputs.downloads_section }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7

      - name: Generate downloads table
        id: generate
        run: |
          VERSION="${{ needs.build-linux.outputs.version }}"

          cat > downloads.md << 'EOF'
          ### ⬇️ Скачать

          <details>
          <summary><b>🪟 Windows</b></summary>

          | Архитектура | Установщик |
          |-------------|------------|
          EOF

          # Windows файлы
          for file in lampa-windows/*.exe; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              size=$(du -h "$file" | cut -f1)

              # Determine architecture from filename
              if [[ "$filename" == *"x64"* ]]; then
                arch="**64-bit**"
              elif [[ "$filename" == *"ia32"* ]]; then
                arch="**32-bit**"
              elif [[ "$filename" == *"arm64"* ]]; then
                arch="**ARM64**"
              elif [[ "$filename" == *"x86"* ]]; then
                arch="**32-bit**"
              else
                arch="**Любая**"
              fi

              echo "| $arch | [\`$filename\`](https://github.com/${{ github.repository }}/releases/download/v$VERSION/$filename) <br> <sup>$size</sup> |" >> downloads.md
            fi
          done

          cat >> downloads.md << 'EOF'
          </details>

          <details>
          <summary><b>🍏 macOS</b></summary>

          | Архитектура | Установщик |
          |-------------|------------|
          EOF

          # macOS файлы
          for file in lampa-macos/*.dmg; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              size=$(du -h "$file" | cut -f1)

              if [[ "$filename" == *"x64"* ]] || [[ "$filename" == *"x86_64"* ]]; then
                arch="**Intel (64-bit)**"
              elif [[ "$filename" == *"arm64"* ]]; then
                arch="**Apple Silicon (ARM64)**"
              else
                arch="**Universal**"
              fi

              echo "| $arch | [\`$filename\`](https://github.com/${{ github.repository }}/releases/download/v$VERSION/$filename) <br> <sup>$size</sup> |" >> downloads.md
            fi
          done

          cat >> downloads.md << 'EOF'
          </details>

          <details>
          <summary><b>🐧 Linux</b></summary>

          | Архитектура | Формат | Установщик |
          |-------------|--------|------------|
          EOF

          # Linux файлы
          for file in lampa-linux/*.deb; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              size=$(du -h "$file" | cut -f1)

              if [[ "$filename" == *"amd64"* ]]; then
                arch="**64-bit**"
                format="DEB"
              elif [[ "$filename" == *"arm64"* ]]; then
                arch="**ARM64**"
                format="DEB"
              elif [[ "$filename" == *"armhf"* ]]; then
                arch="**ARMv7**"
                format="DEB"
              fi

              echo "| $arch | $format | [\`$filename\`](https://github.com/${{ github.repository }}/releases/download/v$VERSION/$filename) <br> <sup>$size</sup> |" >> downloads.md
            fi
          done

          for file in lampa-linux/*.rpm; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              size=$(du -h "$file" | cut -f1)

              if [[ "$filename" == *"x86_64"* ]]; then
                arch="**64-bit**"
                format="RPM"
              elif [[ "$filename" == *"aarch64"* ]]; then
                arch="**ARM64**"
                format="RPM"
              elif [[ "$filename" == *"armv7"* ]]; then
                arch="**ARMv7**"
                format="RPM"
              fi

              echo "| $arch | $format | [\`$filename\`](https://github.com/${{ github.repository }}/releases/download/v$VERSION/$filename) <br> <sup>$size</sup> |" >> downloads.md
            fi
          done

          for file in lampa-linux/*.AppImage; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              size=$(du -h "$file" | cut -f1)

              if [[ "$filename" == *"x86_64"* ]]; then
                arch="**64-bit**"
                format="AppImage"
              elif [[ "$filename" == *"arm64"* ]]; then
                arch="**ARM64**"
                format="AppImage"
              fi

              echo "| $arch | $format | [\`$filename\`](https://github.com/${{ github.repository }}/releases/download/v$VERSION/$filename) <br> <sup>$size</sup> |" >> downloads.md
            fi
          done

          cat >> downloads.md << 'EOF'
          </details>
          EOF

          downloads_section=$(cat downloads.md)
          echo "downloads_section<<EOF" >> $GITHUB_OUTPUT
          echo "$downloads_section" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows, generate-downloads-table]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7

      - name: Combine release body
        run: |
          # Combine changelog with downloads section
          echo "${{ needs.build-linux.outputs.changelog_body }}" > release_body.md
          echo "" >> release_body.md
          echo "${{ needs.generate-downloads-table.outputs.downloads_section }}" >> release_body.md

          # Show the combined body for debugging
          cat release_body.md

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: release_body.md
          files: |
            lampa-linux/*.AppImage
            lampa-linux/*.deb
            lampa-linux/*.rpm
            lampa-linux/latest-linux.yml
            lampa-macos/*.dmg
            lampa-macos/*.blockmap
            lampa-macos/latest-mac.yml
            lampa-windows/*.exe
            lampa-windows/*.blockmap
            lampa-windows/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
